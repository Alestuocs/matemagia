    <script>
      // SPA redirect helper: if we arrived from 404.html with ?p=/…, rewrite history.
      (function () {
        var l = window.location;
        if (l.search.indexOf('?p=/') === 0 || l.search.indexOf('&p=/') > -1) {
          var s = l.search.slice(1).split('&').reduce(function (acc, kv) {
            var idx = kv.indexOf('=');
            acc[kv.slice(0, idx)] = decodeURIComponent(kv.slice(idx + 1)).replace(/~and~/g, '&');
            return acc;
          }, {});
          var path = (s.p || '/').replace(/^\/+/, '/');
          var q = s.q ? '?' + s.q : '';
          window.history.replaceState(null, '', l.pathname + path.replace(/^\//, '') + q + l.hash);
        }
      })();
    </script>
