name: Build Android APK

on:
  workflow_dispatch: # build on demand
  push:
    tags: ['v*'] # auto on version tags

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          packages: 'platforms;android-34 build-tools;34.0.0'

      - run: npm ci

      - name: Build web bundle (Android target)
        env:
          BUILD_TARGET: android
        run: npx vite build

      - name: Initialize Android project if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Generate Android launcher icon + splash
        run: |
          if [ -f resources/icon.png ]; then
            npx @capacitor/assets generate --android \
              --iconBackgroundColor "#8b5cf6" \
              --iconBackgroundColorDark "#4c1d95" \
              --splashBackgroundColor "#8b5cf6" \
              --splashBackgroundColorDark "#4c1d95" || echo "asset generation failed (continuing)"
          else
            echo "resources/icon.png missing; skipping asset generation"
          fi

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: matemagia-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
