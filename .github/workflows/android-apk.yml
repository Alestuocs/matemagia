name: Build Android APK

on:
  workflow_dispatch: # build on demand
  push:
    tags: ['v*'] # auto on version tags

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          api-level: 34

      - run: npm ci

      - name: Build web bundle (Android target)
        env:
          BUILD_TARGET: android
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "VITE_SUPABASE_URL=https://abdvoipoewiuneabxyqb.supabase.co" > .env
          fi
          npx vite build

      - name: Initialize Android project if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: matemagia-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
